name: Rails CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mail_sending_service .

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mail_sending_service


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |

          docker stop mail_app || true
          docker rm mail_app || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/mail_sending_service

          docker run -d \
            -p 80:8080 \
            --name mail_app \
            -e RAILS_ENV=production \
            ${{ secrets.DOCKER_USERNAME }}/mail_sending_service