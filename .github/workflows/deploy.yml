name: Deploy Rails App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/mail_sending_service:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mail_sending_service:latest

    - name: Deploy on EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Pull latest image"
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/mail_sending_service:latest
          
          echo "Stop old container"
          docker stop mail_app || true
          docker rm mail_app || true
          
          echo "Start new container"
          sudo docker run -d \
            --name mail_app \
            -p 3000:8080 \
            -e RAILS_ENV=production \
            -e PORT=8080 \
            -e SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }} \
            -e DATABASE_URL=postgresql://yash:${{ secrets.DB_PASSWORD }}@172.17.0.1:5432/myapp_production \
            --add-host=host.docker.internal:host-gateway \
            --restart always \
            ${{ secrets.DOCKER_USERNAME }}/mail_sending_service:latest
          echo "Deployment finished"