name: Rails CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: docker build -t yashwardhan24/mail_sending_service .

    - name: Push Image
      run: docker push yashwardhan24/mail_sending_service

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          docker stop mail_app || true
          docker rm mail_app || true

          docker pull yashwardhan24/mail_sending_service

          docker run -d \
            -p 80:8080 \
            --name mail_app \
            -e RAILS_ENV=production \
            yashwardhan24/mail_sending_service