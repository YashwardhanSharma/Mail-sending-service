name: Deploy Rails App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mail_sending_service .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mail_sending_service

    - name: Deploy on EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Pull latest image"
          docker pull ${{ secrets.DOCKER_USERNAME }}/mail_sending_service
          
          echo "Stop old container"
          docker stop mail_app || true
          docker rm mail_app || true
          
          echo "Start new container"
          docker run -d \
            --name mail_app \
            -p 80:8080 \
            -e RAILS_ENV=production \
            -e PORT=8080 \
            -e RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }} \
            --restart always \
            ${{ secrets.DOCKER_USERNAME }}/mail_sending_service
          
          echo "Deployment finished"